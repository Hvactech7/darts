  :root{
    --bg:#060a1a;
    --panel:#101a3a; --panel2:#1a2752; --line:#2f4488;
    --txt:#f3f6ff; --muted:#9fb0dd;
    --blue:#4f7cff; --blue-lt:#8aa9ff; --blue-dk:#1b46d6;   /* royal / metallic blue */
    --yellow:#ffd400; --yellow-lt:#ffe45c;                  /* vibrant bright yellow */
    --gold:#ffce3a; --red:#ff4d6a; --green:#27e36b;
    --accent:var(--blue); --accent2:var(--yellow); --danger:#ff4d6a;
    --display:'Orbitron','Rajdhani',-apple-system,BlinkMacSystemFont,sans-serif;
    --body:'Rajdhani',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(circle at 12% -5%, rgba(79,124,255,.16), transparent 38%),
      radial-gradient(circle at 88% 4%, rgba(255,212,0,.16), transparent 40%),
      radial-gradient(circle at 50% 120%, rgba(79,124,255,.20), transparent 48%),
      var(--bg);
    background-attachment:fixed;color:var(--txt);
    font-family:var(--body);font-size:17px;font-weight:500;overscroll-behavior:none;}
  .wrap{max-width:900px;margin:0 auto;padding:14px;}
  h1{font-family:var(--display);font-size:24px;font-weight:900;margin:2px 0 10px;letter-spacing:1px;text-transform:uppercase;
     display:flex;align-items:center;gap:10px;}
  h1 .h1-text{background:linear-gradient(90deg,var(--blue),var(--yellow));-webkit-background-clip:text;background-clip:text;color:transparent;
     filter:drop-shadow(0 0 10px rgba(79,124,255,.35));}
  h2{font-family:var(--display);font-size:15px;font-weight:700;margin:0 0 12px;color:var(--blue);text-transform:uppercase;letter-spacing:1.4px;}
  .card{position:relative;background:linear-gradient(160deg,rgba(40,33,95,.85),rgba(20,15,52,.92));
     border:1px solid var(--line);border-radius:18px;padding:13px;margin-bottom:10px;
     box-shadow:0 6px 26px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.05);}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .grow{flex:1;}
  label.field{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;}
  input[type=text]{width:100%;padding:13px 14px;border-radius:12px;border:1px solid var(--line);
       background:rgba(10,7,30,.6);color:var(--txt);font-family:var(--body);font-size:17px;font-weight:600;}
  input[type=text]:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,124,255,.18);}
  button{font-family:var(--display);cursor:pointer;border:none;border-radius:12px;font-size:15px;font-weight:700;letter-spacing:.5px;
       padding:13px 16px;color:var(--txt);background:rgba(34,28,82,.8);border:1px solid var(--line);
       transition:transform .06s,box-shadow .15s,filter .15s;}
  button:active{transform:scale(.96);}
  button.primary{background:linear-gradient(135deg,var(--blue-lt),var(--blue));color:#fff;border:none;box-shadow:0 0 20px rgba(79,124,255,.5);}
  button.accent{background:linear-gradient(135deg,var(--yellow-lt),var(--yellow));color:#241a00;border:none;box-shadow:0 0 20px rgba(255,212,0,.5);}
  button.confirm-btn{background:linear-gradient(135deg,#ff5d72,#d92242);color:#fff;border:none;box-shadow:0 0 20px rgba(255,77,106,.5);}
  button.primary:active,button.accent:active,button.confirm-btn:active{filter:brightness(1.12);}
  button.ghost{background:rgba(255,255,255,.04);}
  button.warn{background:rgba(255,64,104,.08);border-color:rgba(255,64,104,.4);color:#ff90a6;}
  button:disabled{opacity:.35;cursor:default;box-shadow:none;}
  .seg-toggle{display:flex;background:rgba(10,7,30,.5);border:1px solid var(--line);border-radius:13px;overflow:hidden;padding:4px;gap:4px;}
  .seg-toggle button{flex:1;border:none;border-radius:9px;background:transparent;}
  .seg-toggle button.on{background:linear-gradient(135deg,var(--blue-lt),var(--blue));color:#fff;box-shadow:0 0 16px rgba(79,124,255,.45);}
  .chip{display:inline-flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);
       border-radius:999px;padding:8px 12px;font-size:15px;}
  .chip.sel{border-color:var(--blue);background:rgba(79,124,255,.14);}
  .chip .x{color:var(--muted);font-weight:700;padding:0 2px;}
  .roster{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
  .pickslot{border:1px dashed var(--line);border-radius:12px;padding:10px;min-height:52px;display:flex;
       align-items:center;justify-content:center;color:var(--muted);font-size:15px;}
  .pickslot.filled{border-style:solid;border-color:var(--blue);color:var(--txt);font-weight:700;box-shadow:inset 0 0 18px rgba(79,124,255,.12);}
  .pickslot.filled.slot1 .small{color:var(--blue-lt);}
  .pickslot.filled.slot2{border-color:var(--yellow);box-shadow:inset 0 0 18px rgba(255,212,0,.14);}
  .pickslot.filled.slot2 .small{color:var(--yellow);}
  .librow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;
       border:1px solid var(--line);border-radius:12px;margin-bottom:8px;background:var(--panel2);}
  .librow .lname{font-size:17px;font-weight:700;}
  .librow button{padding:9px 14px;font-size:14px;}
  .teamcols{display:flex;gap:12px;}
  .teamcol{flex:1;min-width:0;}
  .teamcol-head{font-family:var(--display);text-align:center;font-weight:800;font-size:14px;letter-spacing:1px;text-transform:uppercase;
       padding:10px;border-radius:11px;margin-bottom:10px;background:rgba(10,7,30,.5);border:1px solid var(--line);}
  .teamcol-head.head1{color:var(--blue);border-color:rgba(79,124,255,.4);box-shadow:0 0 14px rgba(79,124,255,.18);}
  .teamcol-head.head2{color:var(--yellow);border-color:rgba(255,212,0,.4);box-shadow:0 0 14px rgba(255,212,0,.18);}
  .namelist{display:flex;flex-direction:column;gap:6px;max-height:292px;overflow-y:auto;padding-right:4px;}
  .nameopt{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 18px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);
       cursor:pointer;font-weight:700;font-size:34px;word-break:break-word;transition:transform .05s;}
  .nameopt:active{transform:scale(.97);}
  .nameopt.sel1{border-color:var(--blue);background:rgba(79,124,255,.16);color:var(--blue);box-shadow:0 0 14px rgba(79,124,255,.3);}
  .nameopt.sel2{border-color:var(--yellow);background:rgba(255,212,0,.16);color:var(--yellow);box-shadow:0 0 14px rgba(255,212,0,.3);}
  .nameopt.disabled{opacity:.25;cursor:default;}
  .nameopt.full{opacity:.5;}
  .hidden{display:none!important;}
  /* GAME */
  .scoreboard{display:flex;gap:12px;margin-bottom:14px;}
  .team{flex:1;display:flex;gap:10px;background:linear-gradient(160deg,rgba(40,33,95,.7),rgba(18,13,46,.9));
       border:1px solid var(--line);border-radius:16px;padding:14px 18px;position:relative;overflow:hidden;
       box-shadow:0 6px 22px rgba(0,0,0,.4);transition:box-shadow .2s,border-color .2s;}
  .team-main{flex:1;min-width:0;}
  .team.active{border-width:2px;}
  .team:not(.active){opacity:.45;filter:saturate(.6);}
  .team.active::before{content:"";position:absolute;left:0;top:0;bottom:0;width:7px;border-radius:16px 0 0 16px;}
  .team1.active{border-color:var(--blue);background:linear-gradient(160deg,rgba(79,124,255,.30),rgba(18,13,46,.92));
       box-shadow:0 0 34px rgba(79,124,255,.6),inset 0 0 28px rgba(79,124,255,.16);}
  .team1.active::before{background:var(--blue);box-shadow:0 0 16px rgba(79,124,255,.9);}
  .team2.active{border-color:var(--yellow);background:linear-gradient(160deg,rgba(255,212,0,.24),rgba(18,13,46,.92));
       box-shadow:0 0 34px rgba(255,212,0,.55),inset 0 0 28px rgba(255,212,0,.14);}
  .team2.active::before{background:var(--yellow);box-shadow:0 0 16px rgba(255,212,0,.9);}
  .team .name{font-family:var(--display);font-size:17px;color:var(--txt);font-weight:700;letter-spacing:.6px;text-transform:uppercase;line-height:1.05;}
  .team1 .name{color:var(--blue-lt);}
  .team2 .name{color:var(--yellow);}
  .team .thrower{font-family:var(--display);font-size:38px;color:var(--yellow);margin-top:4px;min-height:20px;font-weight:800;line-height:1.02;}
  .team1 .thrower{color:var(--blue-lt);}
  .team .big{font-family:var(--display);font-size:72px;font-weight:900;line-height:1;margin-top:12px;letter-spacing:1px;}
  .team1.active .big{color:var(--blue);text-shadow:0 0 18px rgba(79,124,255,.55);}
  .team2.active .big{color:var(--yellow);text-shadow:0 0 18px rgba(255,212,0,.55);}
  .team-hist{display:flex;flex-direction:column;gap:5px;justify-content:flex-end;flex-shrink:0;}
  .histlbl{font-family:var(--display);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);text-align:center;margin-bottom:1px;}
  .histscore{font-family:var(--display);background:rgba(10,7,30,.55);border:1px solid var(--line);border-radius:9px;padding:5px 10px;
       font-size:15px;font-weight:700;color:var(--muted);text-align:center;min-width:50px;}
  .histscore.latest{color:var(--txt);border-color:var(--blue);box-shadow:0 0 12px rgba(79,124,255,.3);}
  .histempty{color:var(--muted);}
  .turnbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .darts{display:flex;gap:8px;flex:1;}
  .dart{font-family:var(--display);flex:1;text-align:center;background:rgba(10,7,30,.55);border:1px solid var(--line);border-radius:11px;
       padding:11px 4px;font-weight:700;font-size:17px;min-height:46px;}
  .dart.empty{color:var(--muted);font-weight:500;}
  .dart.bust{color:var(--danger);border-color:rgba(255,64,104,.5);box-shadow:0 0 12px rgba(255,64,104,.3);}
  .dart.nocount{color:var(--muted);text-decoration:line-through;}
  .boardwrap{display:flex;justify-content:center;position:relative;padding:6px 0;}
  svg.board{width:100%;max-width:610px;height:auto;touch-action:manipulation;display:block;
       filter:saturate(1.2) drop-shadow(0 0 24px rgba(79,124,255,.4));}
  .board path,.board circle{cursor:pointer;stroke:#080510;stroke-width:1;}
  .board path:active,.board circle:active{filter:brightness(1.7);}
  .board .num{font-family:var(--display);fill:#fff;font-size:15px;font-weight:700;pointer-events:none;text-anchor:middle;dominant-baseline:central;}
  .gamebtns{display:flex;gap:10px;margin-top:12px;}
  .gamebtns button{flex:1;}
  /* cricket */
  .cricket{width:100%;border-collapse:collapse;table-layout:fixed;}
  .cricket td,.cricket th{padding:12px 6px;text-align:center;border-bottom:1px solid var(--line);}
  .cricket .mcell{width:38%;}
  .cricket .chead th{border-bottom:2px solid var(--line);padding-bottom:14px;}
  .cricket .chead .mcell{font-family:var(--display);font-weight:800;font-size:19px;color:var(--txt);text-transform:uppercase;letter-spacing:.5px;}
  .cricket .chead .head1{color:var(--blue);text-shadow:0 0 12px rgba(79,124,255,.4);}
  .cricket .chead .head2{color:var(--yellow);text-shadow:0 0 12px rgba(255,212,0,.4);}
  .cricket .spine{width:24%;background:rgba(10,7,30,.5);border-left:1px solid var(--line);
       border-right:1px solid var(--line);font-weight:800;}
  .cricket .tgt{font-family:var(--display);font-size:24px;color:var(--txt);}
  .cricket .chead .spine,.cricket .ptrow .spine{font-family:var(--display);font-size:12px;color:var(--muted);font-weight:700;
       text-transform:uppercase;letter-spacing:.6px;}
  .cricket .marks{font-size:28px;letter-spacing:4px;font-weight:800;color:var(--blue);text-shadow:0 0 10px rgba(79,124,255,.35);}
  #game.cricket #cricketBoard .cricket .marks.closed{color:var(--gold);text-shadow:none;box-sizing:border-box;border:5px solid var(--gold);border-radius:50%;width:72px;height:72px;margin:0 auto;font-size:54px;box-shadow:0 0 12px rgba(255,214,74,.35);}
  .cricket .cric-pts{font-family:var(--display);font-size:26px;font-weight:900;}
  .cricket .activeside{background:rgba(255,255,255,.05);}
  .cricket .ptrow td{border-bottom:none;padding-top:14px;}
  /* both teams closed this number → dead, no longer scorable */
  .cricket tr.deadrow td{opacity:.3;}
  .cricket tr.deadrow .marks,.cricket tr.deadrow .marks.closed,.cricket tr.deadrow .tgt{color:var(--muted);text-shadow:none;}
  .toast{font-family:var(--display);position:fixed;left:50%;bottom:26px;transform:translateX(-50%);
       background:linear-gradient(135deg,var(--gold),#ff9d3a);color:#1a1206;
       padding:14px 24px;border-radius:14px;font-weight:800;font-size:18px;letter-spacing:.5px;
       box-shadow:0 8px 34px rgba(255,160,40,.5);z-index:50;}
  .winbanner{text-align:center;padding:20px;}
  .winbanner .big{font-family:var(--display);font-size:34px;font-weight:900;letter-spacing:1px;margin:10px 0;
       background:linear-gradient(90deg,var(--yellow),#ffffff,var(--blue-lt));-webkit-background-clip:text;background-clip:text;color:transparent;
       filter:drop-shadow(0 0 14px rgba(255,214,74,.4));}
  .small{font-size:14px;color:var(--muted);}
  .center{text-align:center;}
  @media (max-width:560px){
    .team .big{font-size:38px;}
    .scoreboard{gap:8px;}
    .histscore{min-width:42px;padding:4px 7px;}
  }

  /* ===== Cricket: scores-first, pop-up board ===== */
  #miniBoard{display:none;}
  #game.cricket #scoreboard{display:none;}
  #game.cricket #cricketBoard .cricket td,#game.cricket #cricketBoard .cricket th{padding:3px 6px;}
  #game.cricket #cricketBoard .cricket .marks{font-size:78px;line-height:1;display:flex;align-items:center;justify-content:center;height:1em;}
  #game.cricket #cricketBoard .cricket .tgt{font-size:48px;}
  #game.cricket #cricketBoard .cricket .chead .mcell{font-size:22px;}
  #game.cricket #cricketBoard .cricket .cric-pts{font-size:60px;}
  .chead .thrower-line{font-size:30px;font-weight:800;min-height:34px;margin-top:6px;letter-spacing:.3px;}
  #game.cricket:not(.board-open) #playArea{display:none;}
  #game.cricket #miniBoard{display:block;margin:0;max-width:112px;cursor:pointer;grid-column:2;justify-self:center;}
  #game.cricket #miniBoard .mini-inner{position:relative;border:1px solid var(--line);border-radius:16px;
       padding:10px;background:rgba(10,7,30,.45);box-shadow:0 0 18px rgba(58,107,255,.18);}
  #game.cricket #miniBoard svg.board{max-width:92px;}
  #game.cricket #miniBoard .mini-label{font-family:var(--display);text-align:center;font-size:12px;
       color:var(--blue-lt);margin-top:6px;text-transform:uppercase;letter-spacing:.7px;}
  #game.cricket.board-open #cricketBoard,#game.cricket.board-open #miniBoard,#game.cricket.board-open>.gamebtns{display:none;}
  #game.cricket.board-open #playArea{position:fixed;inset:0;z-index:200;margin:0;border-radius:0;
       display:flex;flex-direction:column;justify-content:center;gap:12px;padding:16px;
       background:radial-gradient(circle at 50% 28%,#0d1430,#060a14);}
  #game.cricket.board-open #playArea svg.board{max-width:min(560px,92vw);margin:0 auto;}

  #backBtn{display:none;}
  #game.cricket.board-open #backBtn{display:block;position:absolute;top:16px;left:16px;z-index:1;}
  #scoreActions{display:none;}
  #game.cricket:not(.board-open) #scoreActions{display:flex;gap:10px;justify-content:center;margin:12px auto 0;max-width:440px;}
  #scoreActions button{flex:1;}

  /* Cricket: active team's name box highlights like the 01 score boxes */
  #game.cricket #cricketBoard .cricket .chead .mcell{transition:background .2s,box-shadow .2s,opacity .2s;}
  #game.cricket #cricketBoard .cricket .chead .mcell:not(.active){opacity:.42;filter:saturate(.6);}
  #game.cricket #cricketBoard .cricket .chead .head1.active{background:linear-gradient(160deg,rgba(125,165,255,.45),rgba(79,124,255,.10));box-shadow:inset 6px 0 0 #7da5ff,inset 0 0 32px rgba(125,165,255,.34);}
  #game.cricket #cricketBoard .cricket .chead .head1.active .pname{color:#2e8bff;-webkit-text-stroke:0.6px #ffffff;text-shadow:none;}
  #game.cricket #cricketBoard .cricket .chead .head2.active .pname{text-shadow:none;}
  #game.cricket #cricketBoard .cricket .chead .head2.active{background:linear-gradient(160deg,rgba(255,212,0,.26),rgba(255,212,0,.04));box-shadow:inset -5px 0 0 var(--yellow),inset 0 0 26px rgba(255,212,0,.16);}

  #game.cricket #cricketBoard .cricket .chead .mcell{vertical-align:bottom;padding-bottom:12px;}
  .chead .pname{font-family:var(--display);font-size:38px;font-weight:800;line-height:1;white-space:nowrap;overflow:hidden;}
  .chead .tlabel{font-family:var(--display);font-size:17px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.7;margin-bottom:2px;}
  #game.cricket #cricketBoard .cricket .smiley{font-size:66px;line-height:1;display:flex;align-items:center;justify-content:center;height:1em;transform:translateY(0.07em);}

  #cricketThrow{display:none;}
  #game.cricket:not(.board-open) #cricketThrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin:8px 0 0;}
  #cricketMissBtn{grid-column:3;justify-self:start;align-self:center;margin-left:18px;font-family:var(--display);font-size:16px;font-weight:700;letter-spacing:.5px;padding:12px 22px;border-radius:12px;}

  /* header dartboard between the player names */
  .cricket .chead .hdrboard{vertical-align:middle;padding:6px 4px;}
  .cricket .hdr-throw{cursor:pointer;display:inline-block;border:1px solid var(--line);border-radius:14px;padding:7px;background:rgba(10,7,30,.45);box-shadow:0 0 16px rgba(79,124,255,.18);}
  .cricket .hdr-throw svg.board{max-width:100px;display:block;margin:0 auto;}
  .cricket .hdr-label{font-family:var(--display);text-align:center;font-size:11px;color:var(--blue-lt);margin-top:5px;text-transform:uppercase;letter-spacing:.6px;}
  #scoreActions #cricketMissBtn{margin-left:0;}

  .librow .lname{flex:1;min-width:0;}
  .librow .teamsel{flex:0 0 auto;max-width:44%;padding:9px 10px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-family:var(--body);font-size:15px;font-weight:600;}
  .nameopt .nopt-team{font-size:19px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}

  /* ===== 301/501 sketch: big round board, cards tucked behind its top corners ===== */
  #game:not(.cricket){position:relative;margin-top:40px;}
  #game:not(.cricket) #playArea{display:flex;flex-direction:column;gap:6px;background:none;border:none;box-shadow:none;padding:0;position:relative;z-index:2;}
  #game:not(.cricket) #playArea .boardwrap{order:1;margin-top:40px;}
  #game:not(.cricket) #playArea .turnbar{order:2;margin:0;align-items:center;position:relative;z-index:3;}
  #game:not(.cricket) #playArea .gamebtns{order:3;margin-top:0;}
  #game:not(.cricket) #playArea #undoBtn{order:-1;flex:0 0 auto;margin-top:-58px;border-radius:20px;}
  #game:not(.cricket) #playArea #redoBtn{order:1;flex:0 0 auto;margin-top:-58px;border-radius:20px;}
  #game:not(.cricket) svg.board{max-width:100%;}
  /* score cards tuck behind the board's top corners (board on top draws the concave edge) */
  #game:not(.cricket) .scoreboard{position:absolute;top:-50px;left:0;right:0;margin:0;z-index:1;display:flex;justify-content:space-between;gap:0;align-items:flex-start;}
  #game:not(.cricket) .scoreboard .team{flex:0 0 auto;width:48%;padding:14px 18px;min-height:200px;flex-direction:column;gap:3px;}
  #game:not(.cricket) .scoreboard .team1{align-items:flex-start;text-align:left;}
  #game:not(.cricket) .scoreboard .team2{align-items:flex-end;text-align:right;}
  #game:not(.cricket) .scoreboard .team .big{font-size:60px;}
  #game:not(.cricket) .scoreboard .team .thrower{font-size:34px;}
  #game:not(.cricket) .team-hist .histscore{min-width:46px;border-radius:999px;}

  /* name and score in opposite top corners of each card */
  #game:not(.cricket) .scoreboard .team{position:relative;}
  #game:not(.cricket) .scoreboard .team .name{position:absolute;top:74px;font-size:15px;opacity:.85;}
  #game:not(.cricket) .scoreboard .team .thrower{position:absolute;top:14px;font-size:34px;font-weight:800;min-height:0;}
  #game:not(.cricket) .scoreboard .team .big{position:absolute;top:8px;margin:0;}
  #game:not(.cricket) .scoreboard .team .team-hist{position:absolute;top:60px;}
  #game:not(.cricket) .scoreboard .team1 .thrower,#game:not(.cricket) .scoreboard .team1 .team-hist{left:18px;}
  #game:not(.cricket) .scoreboard .team1 .big,#game:not(.cricket) .scoreboard .team1 .name{right:18px;}
  #game:not(.cricket) .scoreboard .team2 .thrower,#game:not(.cricket) .scoreboard .team2 .team-hist{right:18px;}
  #game:not(.cricket) .scoreboard .team2 .big,#game:not(.cricket) .scoreboard .team2 .name{left:18px;}
</style>
</head>
<body>
<div class="wrap">
  <!-- ================= SETUP ================= -->
  <div id="setup">
    <h1><span class="h1-dart">🎯</span><span class="h1-text">Darts Scorekeeper</span></h1>
    <div class="card">
      <h2>Game</h2>
      <div class="seg-toggle" id="gameSel">
        <button data-game="301">301</button>
        <button data-game="501" class="on">501</button>
        <button data-game="cricket">Cricket</button>
      </div>
    </div>

    <div class="card">
      <h2>Mode</h2>
      <div class="seg-toggle" id="modeSel">
        <button data-mode="2p" class="on">1 vs 1</button>
        <button data-mode="2t">2 vs 2</button>
      </div>
    </div>

    <div class="card">
      <h2 id="slotsTitle">Line-up</h2>
      <div id="slots" class="row"></div>
      <p class="small center" id="lineupHint" style="margin-top:10px;"></p>
    </div>

    <div class="card">
      <h2>Select Players</h2>
      <div class="teamcols">
        <div class="teamcol">
          <div class="teamcol-head head1">Team 1</div>
          <div class="namelist" id="col1"></div>
        </div>
        <div class="teamcol">
          <div class="teamcol-head head2">Team 2</div>
          <div class="namelist" id="col2"></div>
        </div>
      </div>
      <button class="accent" id="manageBtn" style="width:100%;margin-top:14px;">⚙ Manage Players</button>
    </div>

    <button class="primary" id="startBtn" style="width:100%;font-size:18px;padding:16px;" disabled>Start Game</button>
  </div>

  <!-- ================= PLAYER LIBRARY ================= -->
  <div id="library" class="hidden">
    <div class="card">
      <h2>Player Library</h2>
      <div class="row" style="margin-bottom:14px;">
        <input type="text" id="newPlayer" class="grow" placeholder="Add a player name…" autocomplete="off">
        <button class="accent" id="addPlayer">Add</button>
      </div>
      <div id="libList"></div>
      <p class="small" style="margin-top:6px;">Names are saved on this device.</p>
    </div>
    <button class="accent" id="manageTeamsBtn" style="width:100%;margin-bottom:10px;">👥 Manage Teams</button>
    <button class="primary" id="libDoneBtn" style="width:100%;font-size:17px;padding:15px;">Done</button>
  </div>

  <!-- ================= TEAM LIBRARY ================= -->
  <div id="teamLibrary" class="hidden">
    <div class="card">
      <h2>Team Library</h2>
      <div class="row" style="margin-bottom:14px;">
        <input type="text" id="newTeam" class="grow" placeholder="Add a team name…" autocomplete="off">
        <button class="accent" id="addTeam">Add</button>
      </div>
      <div id="teamList"></div>
      <p class="small" style="margin-top:6px;">Teams are saved on this device. Assign players to teams in “Manage Players”.</p>
    </div>
    <button class="primary" id="teamDoneBtn" style="width:100%;font-size:17px;padding:15px;">Done</button>
  </div>

  <!-- ================= GAME ================= -->
  <div id="game" class="hidden">
    <div class="scoreboard" id="scoreboard"></div>
    <div id="cricketBoard"></div>
    <div id="scoreActions"><button id="cricketMissBtn" class="ghost">Miss</button><button id="scoreUndoBtn" class="warn">↶ Undo</button><button id="scoreRedoBtn" class="warn">↷ Redo</button></div>

    <div class="card" id="playArea">
      <button id="backBtn" class="ghost">← Back</button>
      <div class="turnbar">
        <div class="darts" id="dartsRow"></div>
        <button class="warn" id="undoBtn">↶ Undo</button><button class="warn" id="redoBtn">↷ Redo</button>
      </div>
      <div class="boardwrap" id="boardwrap"></div>
      <div class="gamebtns">
        <button class="ghost" id="missBtn">Miss / 0</button>
        <button class="confirm-btn" id="endTurnBtn">Confirm ▶</button>
      </div>
    </div>

    <div class="gamebtns">
      <button class="ghost" id="newGameBtn">↺ New Game</button>
      <button class="warn" id="quitBtn">Quit to Menu</button>
    </div>
  </div>

  <!-- ================= WIN ================= -->
  <div id="winScreen" class="hidden">
    <div class="card winbanner">
      <div class="small">WINNER</div>
      <div class="big" id="winName">—</div>
      <div class="small" id="winDetail"></div>
      <div class="gamebtns" style="margin-top:18px;">
        <button class="primary grow" id="rematchBtn">Rematch</button>
        <button class="ghost grow" id="winMenuBtn">Main Menu</button>
      </div>
      <button class="warn" id="winUndoBtn" style="width:100%;margin-top:10px;">↶ Undo — back to game</button>
    </div>
  </div>
</div>

<script>
//============================ STATE ============================
const LS_PLAYERS='darts_players_v1';
const LS_TEAMS='darts_teams_v1';
const LS_PTEAMS='darts_player_teams_v1';
let roster=loadRoster();            // array of names
let teamLib=loadTeams();             // array of team names
let playerTeams=loadPlayerTeams();   // { playerName: teamName }
let config={game:'501',mode:'2p'};  // selection
let teamSel=[[],[]];                 // [Team 1 names, Team 2 names]
let G=null;                          // active game object
let history=[];
let redoStack=[];
let BOARD_SVG='';                      // undo snapshots

const NUMBERS=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
const CRICKET_TARGETS=[20,19,18,17,16,15,25]; // 25 = bull

//============================ ROSTER ============================
function loadRoster(){try{return JSON.parse(localStorage.getItem(LS_PLAYERS))||[];}catch(e){return [];}}
function saveRoster(){localStorage.setItem(LS_PLAYERS,JSON.stringify(roster));}
function loadTeams(){try{return JSON.parse(localStorage.getItem(LS_TEAMS))||[];}catch(e){return [];}}
function saveTeams(){localStorage.setItem(LS_TEAMS,JSON.stringify(teamLib));}
function loadPlayerTeams(){try{return JSON.parse(localStorage.getItem(LS_PTEAMS))||{};}catch(e){return {};}}
function savePlayerTeams(){localStorage.setItem(LS_PTEAMS,JSON.stringify(playerTeams));}
function teamOfPlayer(n){return playerTeams[n]||'';}

function teamOf(name){
  if(teamSel[0].includes(name))return 0;
  if(teamSel[1].includes(name))return 1;
  return -1;
}
function renderColumns(){
  [0,1].forEach(t=>{
    const el=document.getElementById(t===0?'col1':'col2');
    el.innerHTML='';
    if(roster.length===0){
      el.innerHTML='<span class="small">No players yet — use “Manage Players”.</span>';
      return;
    }
    const full=teamSel[t].length>=reqPerTeam();
    roster.forEach(name=>{
      const owner=teamOf(name);
      const selHere=owner===t;
      const inOther=owner!==-1 && owner!==t;
      const div=document.createElement('div');
      let cls='nameopt';
      if(selHere) cls+=' sel'+(t+1);
      else if(inOther) cls+=' disabled';     // picked by the other team → grayed, un-pressable
      else if(full) cls+=' full';            // this team is already full
      div.className=cls;
      const tm=teamOfPlayer(name);
      div.innerHTML='<span class="nopt-name"></span>'+(tm?'<span class="nopt-team"></span>':'');
      div.querySelector('.nopt-name').textContent=name;
      if(tm) div.querySelector('.nopt-team').textContent=tm;
      if(!inOther) div.onclick=()=>toggleName(name,t);
      el.appendChild(div);
    });
  });
}
function renderLibrary(){
  const el=document.getElementById('libList');
  el.innerHTML='';
  if(roster.length===0){
    el.innerHTML='<p class="small">No players yet. Add one above.</p>';
    return;
  }
  roster.forEach(name=>{
    const row=document.createElement('div');
    row.className='librow';
    const opts=['<option value="">— no team —</option>']
      .concat(teamLib.map(tm=>`<option value="${esc(tm)}"${teamOfPlayer(name)===tm?' selected':''}>${esc(tm)}</option>`)).join('');
    row.innerHTML=`<span class="lname"></span><select class="teamsel">${opts}</select><button class="warn">Delete</button>`;
    row.querySelector('.lname').textContent=name;
    row.querySelector('.teamsel').onchange=(e)=>setPlayerTeam(name,e.target.value);
    row.querySelector('button').onclick=()=>{ if(confirm(`Delete "${name}"?`)) removePlayer(name); };
    el.appendChild(row);
  });
}
function renderTeamLibrary(){
  const el=document.getElementById('teamList');
  el.innerHTML='';
  if(teamLib.length===0){ el.innerHTML='<p class="small">No teams yet. Add one above.</p>'; return; }
  teamLib.forEach(tm=>{
    const row=document.createElement('div');
    row.className='librow';
    row.innerHTML='<span class="lname"></span><button class="warn">Delete</button>';
    row.querySelector('.lname').textContent=tm;
    row.querySelector('button').onclick=()=>{ if(confirm(`Delete team "${tm}"?`)) removeTeam(tm); };
    el.appendChild(row);
  });
}
function addTeam(name){
  name=name.trim(); if(!name)return;
  if(teamLib.some(t=>t.toLowerCase()===name.toLowerCase()))return;
  teamLib.push(name);saveTeams();renderTeamLibrary();
}
function removeTeam(name){
  teamLib=teamLib.filter(t=>t!==name);
  Object.keys(playerTeams).forEach(p=>{ if(playerTeams[p]===name) delete playerTeams[p]; });
  saveTeams();savePlayerTeams();renderTeamLibrary();renderLibrary();
}
function setPlayerTeam(name,team){
  if(team) playerTeams[name]=team; else delete playerTeams[name];
  savePlayerTeams();
}
function addPlayer(name){
  name=name.trim();
  if(!name)return;
  if(roster.some(p=>p.toLowerCase()===name.toLowerCase()))return;
  roster.push(name);saveRoster();renderColumns();renderLibrary();
}
function removePlayer(name){
  roster=roster.filter(p=>p!==name);
  delete playerTeams[name]; savePlayerTeams();
  teamSel=teamSel.map(arr=>arr.filter(n=>n!==name));
  saveRoster();renderColumns();renderLibrary();renderLineup();updateStart();
}

//============================ TEAM SELECTION / LINEUP ============================
function reqPerTeam(){return config.mode==='2p'?1:2;}
function resetSelection(){teamSel=[[],[]];}
function toggleName(name,team){
  const owner=teamOf(name);
  if(owner===team){                                  // tap again to deselect
    teamSel[team]=teamSel[team].filter(n=>n!==name);
  }else if(owner===-1){                               // free → add if room
    if(teamSel[team].length<reqPerTeam()) teamSel[team].push(name);
  } // owner===other team → un-pressable, ignore
  renderColumns();renderLineup();updateStart();
}
function renderLineup(){
  const req=reqPerTeam();
  document.getElementById('slotsTitle').textContent=config.mode==='2p'?'Match-up':'Teams';
  const el=document.getElementById('slots');
  el.innerHTML='';
  [0,1].forEach(t=>{
    const names=teamSel[t];
    const label='Team '+(t+1);
    const d=document.createElement('div');
    d.className='grow pickslot slot'+(t+1)+(names.length===req?' filled':'');
    d.style.minWidth='120px';
    const body=names.length?names.map(esc).join(' & '):'pick below';
    d.innerHTML=`<div class="center"><div class="small">${label}</div><div>${body}</div></div>`;
    el.appendChild(d);
  });
  document.getElementById('lineupHint').textContent=
    config.mode==='2p'?'Pick one player per side.':'Pick two players per team — they alternate throwers each round.';
}
function updateStart(){
  const req=reqPerTeam();
  const ready=teamSel[0].length===req && teamSel[1].length===req;
  document.getElementById('startBtn').disabled=!ready;
}

//============================ SETUP EVENTS ============================
document.getElementById('gameSel').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  config.game=b.dataset.game;
  [...e.currentTarget.children].forEach(c=>c.classList.toggle('on',c===b));
});
document.getElementById('modeSel').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  config.mode=b.dataset.mode;
  [...e.currentTarget.children].forEach(c=>c.classList.toggle('on',c===b));
  resetSelection();
  renderColumns();renderLineup();updateStart();
});
let lastAdd=0;
const addFromInput=()=>{
  const inp=document.getElementById('newPlayer');
  addPlayer(inp.value);
  inp.value='';
  inp.focus();
};
const addBtn=document.getElementById('addPlayer');
// Handle the add on pointerdown itself and cancel the default, so the press
// can't be "eaten" by the input blurring / keyboard dismissing on the first
// tap. A short guard stops the follow-up click from double-adding.
const fireAdd=(e)=>{
  if(e){e.preventDefault();}
  const now=(e&&e.timeStamp)||0;
  if(now && now-lastAdd<350) return;   // ignore duplicate event from same tap
  lastAdd=now;
  addFromInput();
};
addBtn.addEventListener('pointerdown',fireAdd);
addBtn.addEventListener('click',fireAdd);
document.getElementById('manageBtn').onclick=()=>{
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('library').classList.remove('hidden');
  renderLibrary();
  document.getElementById('newPlayer').focus();
};
document.getElementById('libDoneBtn').onclick=()=>{
  document.getElementById('library').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
  renderColumns();renderLineup();updateStart();
};
document.getElementById('newPlayer').addEventListener('keydown',e=>{
  if(e.key==='Enter'){addPlayer(e.target.value);e.target.value='';}
});
document.getElementById('manageTeamsBtn').onclick=()=>{
  document.getElementById('library').classList.add('hidden');
  document.getElementById('teamLibrary').classList.remove('hidden');
  renderTeamLibrary();
  document.getElementById('newTeam').focus();
};
document.getElementById('teamDoneBtn').onclick=()=>{
  document.getElementById('teamLibrary').classList.add('hidden');
  document.getElementById('library').classList.remove('hidden');
  renderLibrary();
};
let lastAddTeam=0;
const addTeamFromInput=()=>{ const inp=document.getElementById('newTeam'); addTeam(inp.value); inp.value=''; inp.focus(); };
const fireAddTeam=(e)=>{ if(e)e.preventDefault(); const now=(e&&e.timeStamp)||0; if(now&&now-lastAddTeam<350)return; lastAddTeam=now; addTeamFromInput(); };
const _addTeamBtn=document.getElementById('addTeam');
_addTeamBtn.addEventListener('pointerdown',fireAddTeam);
_addTeamBtn.addEventListener('click',fireAddTeam);
document.getElementById('newTeam').addEventListener('keydown',e=>{ if(e.key==='Enter'){addTeam(e.target.value);e.target.value='';} });
document.getElementById('startBtn').onclick=startGame;

//============================ GAME SETUP ============================
function buildTeams(){
  // returns array of team objects
  if(config.mode==='2p'){
    return [mkTeam(teamSel[0][0],[teamSel[0][0]]), mkTeam(teamSel[1][0],[teamSel[1][0]])];
  }else{
    return [mkTeam('Team 1',teamSel[0].slice()), mkTeam('Team 2',teamSel[1].slice())];
  }
}
function mkTeam(name,members){
  return {name,members,memberIdx:0,score:0,marks:{},pts:0,opened:false,history:[],tripleClose:{}};
}
function startGame(){
  const teams=buildTeams();
  const isCricket=config.game==='cricket';
  const start=isCricket?0:parseInt(config.game,10);
  teams.forEach(t=>{
    t.score=start;
    if(isCricket){CRICKET_TARGETS.forEach(n=>t.marks[n]=0);t.pts=0;}
  });
  G={
    game:config.game, mode:config.mode, isCricket,
    requireDoubleIn: config.game==='301',
    requireDoubleOut: !isCricket,
    teams, cur:0, darts:[],
    turnStartScore:teams[0].score, turnStartOpened:teams[0].opened,
    turnLocked:false, pendingWin:null, round:1, over:false
  };
  history=[];
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  document.getElementById('cricketBoard').classList.toggle('hidden',!isCricket);
  document.getElementById('game').classList.toggle('cricket', isCricket);
  document.getElementById('game').classList.remove('board-open');
  buildBoard();
  renderGame();
}

//============================ DART INPUT ============================
function curTeam(){return G.teams[G.cur];}
function thrower(){const t=curTeam();return t.members[t.memberIdx];}

function snapshot(){
  return JSON.stringify({teams:G.teams,cur:G.cur,darts:G.darts,
    turnStartScore:G.turnStartScore,turnStartOpened:G.turnStartOpened,
    turnLocked:G.turnLocked,pendingWin:G.pendingWin,round:G.round,over:G.over});
}
function pushHistory(){history.push(snapshot());redoStack.length=0;if(history.length>200)history.shift();}
function applyState(s){
  G.teams=s.teams;G.cur=s.cur;G.darts=s.darts;
  G.turnStartScore=s.turnStartScore;G.turnStartOpened=s.turnStartOpened;
  G.turnLocked=s.turnLocked;G.pendingWin=s.pendingWin;G.round=s.round;G.over=s.over;
  if(G.over){G.over=false;}
  document.getElementById('winScreen').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  renderGame();
}
function undo(){
  if(history.length===0)return;
  redoStack.push(snapshot());
  applyState(JSON.parse(history.pop()));
}
function redo(){
  if(redoStack.length===0)return;
  history.push(snapshot());
  applyState(JSON.parse(redoStack.pop()));
}

// register one dart: value=number(0 for miss, 25 for bull), mult=1/2/3
function throwDart(value,mult){
  if(G.over)return;
  if(G.turnLocked)return;
  if(G.darts.length>=3)return;
  pushHistory();
  const score=value*mult;
  const label=dartLabel(value,mult);
  G.darts.push({value,mult,score,label,bust:false,noCount:false});

  if(G.isCricket){ applyCricket(value,mult); }
  else{ applyX01(value,mult); }

  if(G.darts.length>=3) G.turnLocked=true; // all 3 thrown — require Confirm
  renderGame();
}

function dartLabel(value,mult){
  if(value===0)return 'Miss';
  if(value===25)return mult===2?'Bull':'25';
  return (mult===2?'D':mult===3?'T':'')+value;
}

//------- 01 logic -------
function bustX01(){
  const t=curTeam();
  G.darts[G.darts.length-1].bust=true;
  t.score=G.turnStartScore;
  t.opened=G.turnStartOpened;
  G.turnLocked=true;            // no more darts this turn — must Confirm
  flashToast('BUST!');
}
function applyX01(value,mult){
  const t=curTeam();
  const isDouble = (mult===2); // double ring, or double bull (25 ×2 = 50)

  // --- double-in (301): nothing counts until you open with a double ---
  if(G.requireDoubleIn && !t.opened){
    if(isDouble){
      t.opened=true;            // opening double also scores below
    }else{
      G.darts[G.darts.length-1].noCount=true;
      if(value>0) flashToast('Need a double to start');
      return;
    }
  }

  const score=value*mult;
  const remaining=t.score-score;

  if(remaining<0 || remaining===1){ bustX01(); return; }   // can't bust below, can't leave 1 (no double finish)

  if(remaining===0){
    if(G.requireDoubleOut && !isDouble){ bustX01(); return; } // must finish on a double
    t.score=0;
    pendWin(G.cur, `${displayName(t)} checked out!`);
    return;
  }
  t.score=remaining;
}

//------- cricket logic -------
function applyCricket(value,mult){
  const t=curTeam();
  if(value===0)return;                       // miss
  const num=value;                           // 25 bull, or 15-20
  if(!CRICKET_TARGETS.includes(num)){
    G.darts[G.darts.length-1].noCount=true;  // hit a non-cricket number
    return;
  }
  const hits=mult; // single=1,double=2,triple=3 ; bull: outer(×1)=1, inner(×2)=2
  const was0=t.marks[num]===0;
  const need=Math.max(0,3-t.marks[num]);
  const used=Math.min(need,hits);
  t.marks[num]+=used;
  if(was0 && mult===3 && num!==25) t.tripleClose[num]=true;  // closed in one triple on first hit
  else if(was0===false){} // (no-op) keep flag once set
  const overflow=hits-used;
  if(overflow>0){
    // score points only if an opponent has NOT closed this number
    const open=G.teams.some((o,i)=>i!==G.cur && o.marks[num]<3);
    if(open){ t.pts+=overflow*num; }
  }
  checkCricketWin();
}

function checkCricketWin(){
  for(let i=0;i<G.teams.length;i++){
    const t=G.teams[i];
    const allClosed=CRICKET_TARGETS.every(n=>t.marks[n]>=3);
    const highest=G.teams.every((o,j)=>j===i||t.pts>=o.pts);
    if(allClosed&&highest){ pendWin(i,`${displayName(t)} closed everything!`); return true; }
  }
  return false;
}

//------- turn flow -------
function commitTurn(){
  if(G.over)return;
  const t=curTeam();
  // record this turn's points scored (0 on a bust) for 01 games
  if(!G.isCricket){ t.history.push(G.turnStartScore - t.score); }
  // advance member within team (for teams of 2)
  t.memberIdx=(t.memberIdx+1)%t.members.length;
  // next team
  G.cur=(G.cur+1)%G.teams.length;
  if(G.cur===0)G.round++;
  G.darts=[];
  G.turnLocked=false;
  G.pendingWin=null;
  G.turnStartScore=curTeam().score;
  G.turnStartOpened=curTeam().opened;
  renderGame();
}

function endTurnManual(){            // the "Confirm ▶" button
  if(G.over)return;
  if(G.pendingWin){ declareWin(G.pendingWin.teamIdx,G.pendingWin.detail); closeBoard(); return; }
  pushHistory();
  // any darts not thrown this turn count as misses
  while(G.darts.length<3){
    G.darts.push({value:0,mult:1,score:0,label:'Miss',bust:false,noCount:false});
  }
  commitTurn();
  closeBoard();
}

//============================ WIN ============================
function pendWin(teamIdx,detail){          // winning dart thrown — wait for Confirm
  G.pendingWin={teamIdx,detail};
  G.turnLocked=true;
  flashToast('Game shot! Confirm to finish');
}
function declareWin(teamIdx,detail){
  G.over=true;
  const t=G.teams[teamIdx];
  document.getElementById('game').classList.add('hidden');
  document.getElementById('winScreen').classList.remove('hidden');
  document.getElementById('winName').textContent=displayName(t);
  document.getElementById('winDetail').textContent=detail||'';
}
function displayName(t){
  return config.mode==='2p'?t.members[0]:`${t.name} (${t.members.join(' & ')})`;
}

//============================ RENDER ============================
function renderGame(){
  renderScoreboard();
  if(G.isCricket)renderCricket();
  renderDarts();
  document.getElementById('undoBtn').disabled=history.length===0;
  var _sub=document.getElementById('scoreUndoBtn'); if(_sub) _sub.disabled=history.length===0;
  var _r1=document.getElementById('redoBtn'); if(_r1) _r1.disabled=redoStack.length===0;
  var _r2=document.getElementById('scoreRedoBtn'); if(_r2) _r2.disabled=redoStack.length===0;
  const confirmBtn=document.getElementById('endTurnBtn');
  confirmBtn.disabled=G.over;
  confirmBtn.textContent=G.pendingWin?'🏆 Confirm Winner':'Confirm ▶';
  confirmBtn.classList.toggle('primary',!!G.pendingWin);
  confirmBtn.classList.toggle('confirm-btn',!G.pendingWin);
}

function renderScoreboard(){
  const el=document.getElementById('scoreboard');
  el.innerHTML='';
  G.teams.forEach((t,i)=>{
    const active=i===G.cur && !G.over;
    const d=document.createElement('div');
    d.className='team team'+(i+1)+(active?' active':'');
    const _player=t.members[t.memberIdx];
    const _teamName=teamOfPlayer(_player);
    const _teamLabel=_teamName || (config.mode==='2p'?'':('Team '+(i+1)));
    const throwerName=_player;
    const big=G.isCricket?t.pts:t.score;
    const needsIn=G.requireDoubleIn && !t.opened;
    let sub=G.isCricket?'points':'remaining';
    if(needsIn) sub='⚠ needs double to start';
    let histHtml='';
    if(!G.isCricket){
      const h=t.history.slice(-4);             // chronological: oldest top, newest bottom
      const last=h.length-1;
      histHtml='<div class="team-hist"><div class="histlbl">last</div>'
        + (h.length ? h.map((s,idx)=>`<span class="histscore${idx===last?' latest':''}">${s}</span>`).join('')
                    : '<span class="histscore histempty">—</span>')
        + '</div>';
    }
    d.innerHTML=`
      <div class="team-main">
        <div class="name">${esc(_teamLabel)}</div>
        <div class="thrower">${active&&throwerName?'▸ '+esc(throwerName):(throwerName?esc(throwerName):'')}</div>
        <div class="big">${big}</div>
        <div class="small"${needsIn?' style="color:var(--gold)"':''}>${needsIn?'⚠ needs double to start':''}</div>
      </div>
      ${histHtml}`;
    el.appendChild(d);
  });
}

function renderDarts(){
  const el=document.getElementById('dartsRow');
  el.innerHTML='';
  for(let i=0;i<3;i++){
    const d=document.createElement('div');
    const dart=G.darts[i];
    if(dart){
      d.className='dart'+(dart.bust?' bust':'')+(dart.noCount?' nocount':'');
      d.textContent=dart.bust?'BUST':dart.label;
      if(dart.noCount && !dart.bust) d.title='did not count';
    }else{
      d.className='dart empty';
      d.textContent='–';
    }
    el.appendChild(d);
  }
}

function renderCricket(){
  // Targets (15-20 + Bull) run down the center spine; Team 1 on the left,
  // Team 2 on the right. (Always exactly two teams in this app.)
  const el=document.getElementById('cricketBoard');
  const t1=G.teams[0], t2=G.teams[1];
  const nm=t=>esc(config.mode==='2p'?t.members[0]:t.name);
  const pname=t=>{ const n=t.members[t.memberIdx]; return esc(n.length>8 ? n.slice(0,7)+'.' : n); };
  const tlabel=i=>{ const t=G.teams[i]; const tm=teamOfPlayer(t.members[t.memberIdx]); return esc(tm || (config.mode==='2p'?('Player '+(i+1)):t.name)); };
  const thr=(t,i)=>{ const active=(G.cur===i && !G.over), multi=t.members.length>1;
    if(multi) return `<div class="thrower-line">${active?'▸ ':''}${esc(t.members[t.memberIdx])}</div>`;
    return active ? `<div class="thrower-line">▸ throwing</div>` : `<div class="thrower-line"></div>`; };
  const cell=(t,idx,n,dead)=>{
    const m=t.marks[n];
    const active=(!dead && G.cur===idx && !G.over)?' activeside':'';
    const tripIn=t.tripleClose && t.tripleClose[n] && m>=3;
    const inner=tripIn ? '<span class="smiley">😁</span>' : `<span class="marks${m>=3?' closed':''}">${markStr(m)}</span>`;
    return `<td class="mcell${active}">${inner}</td>`;
  };
  let html='<div class="card"><table class="cricket">'
    +`<tr class="chead"><th class="mcell head1${(G.cur===0&&!G.over)?' active':''}"><div class="tlabel">${tlabel(0)}</div><div class="pname">${pname(t1)}</div></th>`
    +'<th class="spine hdrboard"><div class="hdr-throw">'+BOARD_SVG+'<div class="hdr-label">▸ Tap</div></div></th>'
    +`<th class="mcell head2${(G.cur===1&&!G.over)?' active':''}"><div class="tlabel">${tlabel(1)}</div><div class="pname">${pname(t2)}</div></th></tr>`;
  CRICKET_TARGETS.forEach(n=>{
    const lbl=n===25?'Bull':n;
    const dead=t1.marks[n]>=3 && t2.marks[n]>=3;   // both closed → no longer scorable
    html+=`<tr class="${dead?'deadrow':''}">`+cell(t1,0,n,dead)+`<td class="spine tgt">${lbl}</td>`+cell(t2,1,n,dead)+'</tr>';
  });
  html+=`<tr class="ptrow"><td class="cric-pts">${t1.pts}</td>`
      +'<td class="spine">Points</td>'
      +`<td class="cric-pts">${t2.pts}</td></tr>`;
  html+='</table></div>';
  el.innerHTML=html;
  const _hb=el.querySelector('.hdr-throw'); if(_hb) _hb.addEventListener('click',openBoard);
}
function markStr(m){ // 0 -> '', 1 -> '/', 2 -> 'X', 3+ -> Ⓧ (closed)
  if(m<=0)return '';
  if(m===1)return '/';
  if(m===2)return 'X';
  return 'X';
}

//============================ DARTBOARD (SVG) ============================
function buildBoard(){
  const cx=260,cy=260;
  // wider double (16→22) and triple (12→22) bands = bigger tap targets
  const rDoubleOut=238,rDoubleIn=216,rTripleOut=158,rTripleIn=136,rBullOut=40,rBull=18,rLabel=251;
  const wedge=18;
  let paths='';
  for(let i=0;i<20;i++){
    const num=NUMBERS[i];
    const a0=i*wedge-wedge/2;
    const a1=i*wedge+wedge/2;
    const dark=(i%2===0);
    const single= dark?'#2c2c2c':'#e9d9b0';
    const ring=  dark?'#c8302b':'#2f8f4e';
    // single inner
    paths+=seg(cx,cy,rBullOut,rTripleIn,a0,a1,single,num,1);
    // triple
    paths+=seg(cx,cy,rTripleIn,rTripleOut,a0,a1,ring,num,3);
    // single outer
    paths+=seg(cx,cy,rTripleOut,rDoubleIn,a0,a1,single,num,1);
    // double
    paths+=seg(cx,cy,rDoubleIn,rDoubleOut,a0,a1,ring,num,2);
  }
  // bull
  paths+=`<circle cx="${cx}" cy="${cy}" r="${rBullOut}" fill="#2f8f4e" data-v="25" data-m="1"></circle>`;
  paths+=`<circle cx="${cx}" cy="${cy}" r="${rBull}" fill="#c8302b" data-v="25" data-m="2"></circle>`;
  // labels
  let labels='';
  for(let i=0;i<20;i++){
    const ang=(i*wedge)*Math.PI/180;
    const x=cx+rLabel*Math.sin(ang);
    const y=cy-rLabel*Math.cos(ang);
    labels+=`<text class="num" x="${x.toFixed(1)}" y="${y.toFixed(1)}">${NUMBERS[i]}</text>`;
  }
  const svg=`<svg class="board" viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg">
     <circle cx="${cx}" cy="${cy}" r="248" fill="#0a0d12"/>
     ${paths}${labels}</svg>`;
  BOARD_SVG=svg;
  const wrap=document.getElementById('boardwrap');
  wrap.innerHTML=svg;
  wrap.querySelector('svg').addEventListener('click',e=>{
    const el=e.target.closest('[data-v]');
    if(!el)return;
    throwDart(parseInt(el.dataset.v,10),parseInt(el.dataset.m,10));
  });
  const mini=document.getElementById('miniBoard');
  if(mini){
    mini.innerHTML='<div class="mini-inner">'+svg+'<div class="mini-label">\u25b8 Tap board to throw</div></div>';
    mini.querySelector('.mini-inner').addEventListener('click',openBoard);
  }
}
function openBoard(){ document.getElementById('game').classList.add('board-open'); }
function closeBoard(){ document.getElementById('game').classList.remove('board-open'); }
function backBoard(){ while(G.darts.length>0) undo(); redoStack.length=0; closeBoard(); renderGame(); }
function seg(cx,cy,ri,ro,a0,a1,fill,num,mult){
  const p=annular(cx,cy,ri,ro,a0,a1);
  return `<path d="${p}" fill="${fill}" data-v="${num}" data-m="${mult}"></path>`;
}
function annular(cx,cy,ri,ro,a0,a1){
  const pt=(r,a)=>{const rad=a*Math.PI/180;return [cx+r*Math.sin(rad),cy-r*Math.cos(rad)];};
  const [x0o,y0o]=pt(ro,a0),[x1o,y1o]=pt(ro,a1);
  const [x1i,y1i]=pt(ri,a1),[x0i,y0i]=pt(ri,a0);
  return `M ${f(x0o)} ${f(y0o)} A ${ro} ${ro} 0 0 1 ${f(x1o)} ${f(y1o)} `+
         `L ${f(x1i)} ${f(y1i)} A ${ri} ${ri} 0 0 0 ${f(x0i)} ${f(y0i)} Z`;
}
function f(n){return n.toFixed(1);}

//============================ TOAST ============================
let toastT=null;
function flashToast(msg){
  let el=document.querySelector('.toast');
  if(!el){el=document.createElement('div');el.className='toast';document.body.appendChild(el);}
  el.textContent=msg;el.style.display='block';
  clearTimeout(toastT);
  toastT=setTimeout(()=>{el.style.display='none';},900);
}

function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
